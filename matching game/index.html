<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Matching Cards Game</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #e4bed9;
    color: rgb(15, 11, 11);
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
}

/* ===== SLIDES ===== */
.slide {
    display: none;
    text-align: center;
    width: 100%;
}

.slide.active {
    display: block;
}

/* ===== BUTTON ===== */
button {
    padding: 12px 24px;
    font-size: 16px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    margin-top: 20px;
    background-color: #2196F3; /* 🔵 Blue background */
    color: white;             /* White text */
    transition: background-color 0.3s;
}

button:hover {
    background-color: #1976D2; /* Darker blue on hover */
}

/* ===== GAME ===== */
.game-board {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
    width: 90vw;
    max-width: 400px;
    margin: 20px auto;
}

.card {
    aspect-ratio: 1 / 1;
    background: #4CAF50;
    border-radius: 10px;
    font-size: 2rem;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    user-select: none;
}

.card.open {
    background: #2196F3;
}

.card.matched {
    background: #777;
    cursor: default;
}
</style>
</head>

<body>

<!-- ===== SLIDE 1: START ===== -->
<div class="slide active" id="slideStart">
    <h1>🃏 Matching Cards Game</h1>
    <p>Test your memory!</p>
    <button onclick="startGame()">Start Game</button>
</div>

<!-- ===== SLIDE 2: GAME ===== -->
<div class="slide" id="slideGame">
    <h2>Match All Cards</h2>
    <div class="game-board" id="board"></div>
</div>

<!-- ===== SLIDE 3: WIN ===== -->
<div class="slide" id="slideWin">
    <h1>🎉 Congratulations!</h1>
    <p>You matched all the cards!</p>
    <button onclick="restart()">Play Again</button>
</div>

<script>
const slideStart = document.getElementById("slideStart");
const slideGame = document.getElementById("slideGame");
const slideWin = document.getElementById("slideWin");
const board = document.getElementById("board");

const symbols = [
    "🍎","🍎","🍌","🍌",
    "🍇","🍇","🍓","🍓",
    "⭐","⭐","❤️","❤️",
    "🌙","🌙","☀️","☀️"
];

let firstCard = null;
let secondCard = null;
let lockBoard = false;
let matchedPairs = 0;

/* ===== SLIDE CONTROL ===== */
function showSlide(slide) {
    slideStart.classList.remove("active");
    slideGame.classList.remove("active");
    slideWin.classList.remove("active");
    slide.classList.add("active");
}

/* ===== SHUFFLE ===== */
function shuffle(array) {
    for (let i = array.length - 1; i > 0; i--) {
        let j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
    }
}

/* ===== START GAME ===== */
function startGame() {
    showSlide(slideGame);
    board.innerHTML = "";
    matchedPairs = 0;
    firstCard = null;
    secondCard = null;
    lockBoard = false;

    shuffle(symbols);

    symbols.forEach(symbol => {
        const card = document.createElement("div");
        card.className = "card";
        card.textContent = "";

        card.addEventListener("click", () => {
            if (lockBoard || card.classList.contains("open")) return;

            card.textContent = symbol;
            card.classList.add("open");

            if (!firstCard) {
                firstCard = card;
            } else {
                secondCard = card;
                checkMatch();
            }
        });

        board.appendChild(card);
    });
}

/* ===== CHECK MATCH ===== */
function checkMatch() {
    lockBoard = true;

    if (firstCard.textContent === secondCard.textContent) {
        firstCard.classList.add("matched");
        secondCard.classList.add("matched");
        matchedPairs++;
        resetTurn();

        if (matchedPairs === symbols.length / 2) {
            setTimeout(() => {
                showSlide(slideWin);
            }, 600);
        }
    } else {
        setTimeout(() => {
            firstCard.textContent = "";
            secondCard.textContent = "";
            firstCard.classList.remove("open");
            secondCard.classList.remove("open");
            resetTurn();
        }, 800);
    }
}

function resetTurn() {
    firstCard = null;
    secondCard = null;
    lockBoard = false;
}

/* ===== RESTART ===== */
function restart() {
    showSlide(slideStart);
}
</script>

</body>
</html>
